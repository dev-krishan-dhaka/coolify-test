version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: sg3cbvfxdloLxGaajvdxHeZScReABQ727k7nDRkUmmP0HrB3n41NHdCY2yoRe1EZ
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      # ✅ FIXED: Use the service name "postgres" NOT the Coolify database ID
      DATABASE_URL: postgresql://postgres:sg3cbvfxdloLxGaajvdxHeZScReABQ727k7nDRkUmmP0HrB3n41NHdCY2yoRe1EZ@postgres:5432/postgres
      PORT: 5000
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
